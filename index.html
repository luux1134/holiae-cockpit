    .lex-s{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--txt);font-family:"Plus Jakarta Sans",sans-serif;margin-bottom:16px;outline:none}
    .lex-s:focus{border-color:var(--accent)}.lex-s::placeholder{color:var(--sec)}

    .lex-t{font-family:"Cormorant Garamond",serif;font-size:18px;font-style:italic;color:var(--accent);margin-bottom:4px}
    .lex-sh{font-size:9px;color:var(--sec);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}

    .empty{background:var(--card);border:1px dashed var(--border);border-radius:8px;padding:16px;color:var(--sec);font-size:12px;line-height:1.6;margin-bottom:8px}
    .loading{min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--accent);font-family:"Cormorant Garamond",serif;font-size:28px;font-style:italic}
    @media(max-width:640px){
      .wrap{padding:14px 10px 28px}.logo{font-size:20px}
      .kg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .kc{padding:12px;min-height:100px}.kv{font-size:24px}
      .funnel{gap:3px}.fl{font-size:8px}
      .row,.dblk{flex-direction:column;align-items:flex-start}
      .rm{width:100%}.vsg{grid-template-columns:1fr}.adc-m{gap:10px}
    }
  </style>

<body>
<div id="app" class="loading">Chargement du cockpit Holiaē…</div>
<script>
const API_KEY  = "AIzaSyADK3alDzNTsEkbKGVDbrdHYBj0esGF0KU";
const SHEET_ID = "17j732Xnp48sOWR_ignS3pgc5eKL4OPCJwUJWKH5Euv4";
const SHEETS   = {shopify:"Shopify_Daily",ga4:"GA4_Channel",ads:"GoogleAds_Campaigns",st:"GoogleAds_SearchTerms",klav:"Klaviyo",klavD:"Klaviyo_Daily",klavA:"Klaviyo_Attribution_Daily",gscP:"GSC_Pages",gscQ:"GSC_Queries",gscPP:"GSC_Pages_Previous",gscQP:"GSC_Queries_Previous",obj:"Objectifs"};
const CKEY = "holiae-v16", TTL = 36e5;
const PRODUCT_COGS = 82;
const SHIPPING_COST = 11;
const VAT_RATE = 0.20;
const PAYMENT_RATE = 0.015;
const PAYMENT_FIXED = 0.25;
const app = document.getElementById("app");
const NF = new Intl.NumberFormat("fr-FR");
const EU = new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
let CAL_MONTH = "";
let HOLIAE_MODEL = null;

document.addEventListener("DOMContentLoaded",init);
async function init(){
  if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
  try{render(await load());}
  catch(e){const c=rcache();if(c)render(c.d,true);else app.innerHTML=`<div class="wrap"><div class="empty">Erreur chargement.<br>${esc(e.message)}</div></div>`;}
}
async function load(){
  clearOldCache();
  const c=rcache();if(c&&Date.now()-c.t<TTL)return c.d;
  if(!API_KEY||API_KEY==="TA_CLE_ICI")throw new Error("Clé API manquante.");
  const e=await Promise.all(Object.entries(SHEETS).map(async([k,nm])=>[k,await fsheet(nm)]));
  const d=Object.fromEntries(e);
  writeCache(d);
  return d;
}
async function fsheet(nm){
  const u=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(nm)}!A:Z?valueRenderOption=UNFORMATTED_VALUE&key=${API_KEY}`;
  const r=await fetch(u);
  if(!r.ok){if(r.status===400||r.status===404)return[];throw new Error(`${nm}:${r.status}`);}
  return r2o((await r.json()).values||[]);
}
function r2o(v){if(!v.length)return[];const h=v[0].map(x=>String(x||"").trim());return v.slice(1).filter(r=>r.some(Boolean)).map(r=>{const o={};h.forEach((k,i)=>o[k]=isDateHeader(k)?normDate(r[i]):r[i]??"");return o;});}
function rcache(){try{return JSON.parse(sessionStorage.getItem(CKEY)||"");}catch{return null;}}
function clearOldCache(){try{Object.keys(localStorage).filter(k=>k.startsWith("holiae")).forEach(k=>localStorage.removeItem(k));}catch(e){}}
function writeCache(d){try{sessionStorage.setItem(CKEY,JSON.stringify({t:Date.now(),d}));}catch(e){try{sessionStorage.removeItem(CKEY);}catch(_){}}}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(raw,off=false){
  const m=model(raw);
  HOLIAE_MODEL=m;
  if(!CAL_MONTH)CAL_MONTH=m.ld.slice(0,7);
  const h=tabHealth(m);
  app.className="wrap";
  app.innerHTML=`<div class="shell">
  <div class="hdr">
    <div class="logo">Holiaē ✦ Cockpit</div>
    <div class="stamp">${off?"Hors ligne · cache":"Màj · 07h00"}<br><span>${fd(m.ld)}</span></div>
  </div>
  <div class="tabs">
    ${tb("alrt","⚠ Alertes ("+m.alerts.length+")",true,"ta")}
    ${tbh("hier","Hier",h.hier)}${tbh("mtd",monthLabel(m.ld),h.mtd)}${tbh("j7","7 jours",h.j7)}
    ${tbh("j28","28 jours",h.j28)}${tbh("m3","3 mois",h.m3)}${tbh("ytd","Année",h.ytd)}
    ${tbh("ads","Ads 7J",h.ads)}${tbh("seo","SEO 28J",h.seo)}${tbh("klv","CRM 28J",h.klv)}${tb("lex","Lexique")}
  </div>
  ${vAlerts(m)}${vHier(m)}${vPer(m,"j7","7 jours glissants","7d","p7d")}
  ${vMtd(m)}${vPer(m,"j28","28 jours glissants","28d","p28d")}
  ${vPer(m,"m3","3 mois glissants","90d","p90d",true)}
  ${vYtd(m)}${vAds(m)}${vSeo(m)}${vKlav(m)}${vLex()}
</div>`;
}
function tb(id,l,on=false,x=""){return`<button class="ht ${x} ${on?"on":""}" onclick="sw('${id}',this)">${l}</button>`;}
function tbh(id,l,health){const dot=health==="g"?"🟢":health==="o"?"🟠":"🔴";return`<button class="ht" onclick="sw('${id}',this)">${dot} ${l}</button>`;}
function tabHealth(m){
  const p=m.p,o=m.ob;
  const h=(ok,warn)=>ok?"g":warn?"o":"r";
  const dE=Math.max(1,pd(m.ld).getDate()),dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  const orderHealth=(key,days)=>{
    if(!o.ord)return"o";
    const target=o.ord*(days/dM);
    return h(p[key].ord>=target*.95,p[key].ord>=target*.85);
  };
  // Business tabs: commandes vs objectif commandes proratisé
  const hier=orderHealth("d1",1);
  const j7=orderHealth("7d",7);
  const mtd=!o.ord||!p.mtd.ord?"o":h((p.mtd.ord/dE*dM)>=o.ord*.95,(p.mtd.ord/dE*dM)>=o.ord*.85);
  const j28=orderHealth("28d",28);
  const m3=orderHealth("90d",90);
  // YTD: projection commandes annuelle vs objectif annuel estimé depuis l'objectif mensuel
  const start=new Date(+m.ld.slice(0,4),0,1),el=Math.max(1,Math.ceil((pd(m.ld)-start)/864e5)+1),dY=leap(+m.ld.slice(0,4))?366:365;
  const ordY=o.ord?o.ord*12:null,projOrdY=p.ytd.ord?p.ytd.ord/el*dY:null;
  const ytd=!projOrdY||!ordY?"o":h(projOrdY>=ordY*.95,projOrdY>=ordY*.85);
  // Ads: ROAS global 7J
  const ads=!p["7d"].roas?"o":h(p["7d"].roas>=3,p["7d"].roas>=2);
  // SEO: position + CTR + quick wins
  const sp=p["28d"].sp,avgPos=sp.length?sp.reduce((a,r)=>a+num(gv(r,"Position")),0)/sp.length:null;
  const sc=sp.reduce((a,r)=>a+num(gv(r,"Clicks")),0),si=sp.reduce((a,r)=>a+num(gv(r,"Impressions")),0),sctr=si?sc/si*100:null;
  const wins=sp.filter(r=>num(gv(r,"Position"))>=4&&num(gv(r,"Position"))<=10&&num(gv(r,"Impressions"))>100).length;
  const seo=!avgPos?"o":h(avgPos<=5&&sctr>=2.5,avgPos<=10||wins>0||sctr>=1.5);
  // CRM: vend sans abîmer la liste
  const kr=m.raw.klav||[],kre=sm(kr,"Recipients"),krev=sm(kr,"Revenue");
  const kop=kre?kr.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Open rate")),0)/kre:null;
  const kcl=kre?kr.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Click rate")),0)/kre:null;
  const kun=kre?kr.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Unsubscribe rate")),0)/kre:null;
  const klv=!kre?"o":(kun>0.5||(!krev&&kre>=100)?"r":(krev>0&&kop>=20&&kcl>=1.5&&kun<=0.35?"g":"o"));
  return{hier,j7,mtd,j28,m3,ytd,ads,seo,klv};
}
function sw(id,btn){document.querySelectorAll(".hv").forEach(x=>x.classList.remove("on"));document.querySelectorAll(".ht").forEach(x=>x.classList.remove("on"));document.getElementById("v-"+id).classList.add("on");btn.classList.add("on");}

// ── MODEL ─────────────────────────────────────────────────────────────────────
function model(raw){
  const dates=cdates(raw);
  const ld=dates.at(-1)||iso(add(new Date(),-1));
  const d2=iso(add(pd(ld),-1));
  const pmtd=prevMonthSamePeriod(ld);
  const p={
    d1:rng(raw,ld,ld),d2:rng(raw,d2,d2),
    "7d":rng(raw,iso(add(pd(ld),-6)),ld),p7d:rng(raw,iso(add(pd(ld),-13)),iso(add(pd(ld),-7))),
    "28d":rng(raw,iso(add(pd(ld),-27)),ld),p28d:rng(raw,iso(add(pd(ld),-55)),iso(add(pd(ld),-28))),
    "90d":rng(raw,iso(add(pd(ld),-89)),ld),p90d:rng(raw,iso(add(pd(ld),-179)),iso(add(pd(ld),-90))),
    mtd:rng(raw,ld.slice(0,7)+"-01",ld),pmtd:rng(raw,pmtd.s,pmtd.e),ytd:rng(raw,ld.slice(0,4)+"-01-01",ld)
  };
  p.seoDrops=seoPageDrops(raw.gscPP||[],raw.gscP||[]);
  p.seoGains=seoPageGains(raw.gscPP||[],raw.gscP||[]);

function goalKcard(l,val,ref,dh,obj,cur){

function pc(l,val,ref,prog,sub){const w=prog==null?0:Math.max(0,Math.min(100,prog));const cls=prog==null?"gold":prog<70?"bad":prog<90?"warn":"gold";return`<div class="kc"><div class="kl">${l}</div><div class="kv">${val}</div><div class="kd N">${ref}</div>${prog==null?"":`<div class="pb"><div class="pf ${cls}" style="width:${w}%"></div></div><div class="ks">${pt(prog)} · ${sub}</div>`}</div>`;}
function pcmp(l,val,ref,delta,prog,obj,extra){const w=prog==null?0:Math.max(0,Math.min(100,prog));const cls=prog==null?"gold":prog<70?"bad":prog<90?"warn":"gold";return`<div class="kc"><div class="kl">${l}</div><div class="kv">${val}</div><div class="kv2">${ref||""}</div><div class="kd">${delta||""}</div>${prog==null?"":`<div class="ks">${obj} · ${pt(prog)}${extra?` · ${extra}`:""}</div><div class="pb"><div class="pf ${cls}" style="width:${w}%"></div></div>`}</div>`;}

function objBar(m,key,p){
  const o=m.ob;
  if(!o.ca&&!o.ord&&!o.bAds)return"";
  const dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  // Pro-rate the objective to the period
  let ratio,label;
  if(key==="d1"){ratio=1/dM;label="J-1";}
  else if(key==="7d"){ratio=7/dM;label="7J";}
  else if(key==="28d"){ratio=28/dM;label="28J";}
  else if(key==="90d")return"";
  else{
    const dE=Math.max(1,pd(m.ld).getDate());
    const proj=p.rev?p.rev/dE*dM:null;
    return`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${o.ca?miniPg("CA MTD",mo(p.rev),mo(o.ca),o.ca?p.rev/o.ca*100:null,proj?`Proj. ${mo(proj)}`:""):""}
      ${o.ord?miniPg("Commandes MTD",fm(p.ord),fm(o.ord),o.ord?p.ord/o.ord*100:null,""):""}
      ${o.bAds?miniPg("Budget Ads MTD",mo(p.cost),mo(o.bAds),o.bAds?p.cost/o.bAds*100:null,""):""}
    </div>`;
  }
  const caO=o.ca?o.ca*ratio:null;
  const ordO=o.ord?o.ord*ratio:null;
  const bO=o.bAds?o.bAds*ratio:null;
  return`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    ${caO?miniPg("CA "+label,mo(p.rev),mo(caO),caO?p.rev/caO*100:null,""):""}
    ${ordO?miniPg("Commandes "+label,fm(p.ord),ordO<1?`~${Math.round(ordO*10)/10}`:fm(Math.round(ordO)),ordO?p.ord/ordO*100:null,""):""}
    ${bO?miniPg("Budget Ads "+label,mo(p.cost),mo(bO),bO?p.cost/bO*100:null,""):""}
  </div>`;
}
function goalSet(m,key){
  const o=m.ob,dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  if(!o.ca&&!o.ord&&!o.bAds)return{};
  const days=key==="d1"?1:key==="7d"?7:key==="28d"?28:key==="90d"?90:null;
  if(!days)return{};
  const ratio=days/dM;
  return{ca:o.ca?o.ca*ratio:null,ord:o.ord?o.ord*ratio:null,bAds:o.bAds?o.bAds*ratio:null};
}

function rhythmHero(m){

function seoGlobalRec(pages,queries){

  const tc=pages.reduce((a,r)=>a+num(gv(r,"Clicks")),0);
  const ti=pages.reduce((a,r)=>a+num(gv(r,"Impressions")),0);
  const avgCtr=ti?tc/ti*100:0;
  const qWins=pages.filter(r=>num(gv(r,"Position"))>=4&&num(gv(r,"Position"))<=10&&num(gv(r,"Impressions"))>100).length;
  if(qWins>=2)return{text:`Traiter ${qWins} quick wins`,detail:`Priorité : pages en position 4-10 avec impressions. Pour chacune : title/meta, 1 section utile, FAQ et 3 liens internes.`,label:"Action",cls:"warn"};
  if(avgPos<=4&&avgCtr>=3)return{text:"SEO sain",detail:`Position moyenne ${Math.round(avgPos*10)/10} · CTR ${Math.round(avgCtr*10)/10}%. Ne pas casser ce qui marche : mise à jour légère + maillage vers les pages business.`,label:"Bon",cls:"good"};
  if(avgPos<=7)return{text:"Gagner des clics",detail:`Position moyenne ${Math.round(avgPos*10)/10} mais CTR ${Math.round(avgCtr*10)/10}%. Action : réécrire les titles/meta des pages visibles avant de produire plus de contenu.`,label:"CTR",cls:"warn"};

}

function crmGlobalRec(m){
  const rows=m.raw.klav||[];
  if(!rows.length)return{text:"Données CRM insuffisantes",detail:"Connecter Klaviyo pour voir les recommandations.",label:"Données",cls:"warn"};
  const totalRev=sm(rows,"Revenue");
  const totalRec=sm(rows,"Recipients");
  const wOpen=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Open rate")),0);
  const avgOpen=totalRec?wOpen/totalRec:0;
  const wUnsub=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Unsubscribe rate")),0);
  const avgUnsub=totalRec?wUnsub/totalRec:0;
  const flows=rows.filter(r=>String(gv(r,"Type")||"").toLowerCase()==="flow");
  const flowRev=sm(flows,"Revenue");
  const flowShare=totalRev?flowRev/totalRev*100:0;
  if(avgUnsub>0.5)return{text:"Pression trop forte",detail:`Unsub moyen ${Math.round(avgUnsub*10)/10}%. Action : réduire la fréquence des campagnes larges et segmenter par intention/achat récent.`,label:"Urgence",cls:"bad"};
  if(flowShare<30&&totalRev>0)return{text:"Automatiser plus de CA",detail:`Flows = ${Math.round(flowShare)}% du CA CRM. Action : renforcer abandon checkout/panier, post-achat et win-back avant d'augmenter les campagnes.`,label:"Flows",cls:"warn"};
  if(avgOpen>=20&&totalRev>0)return{text:"CRM exploitable",detail:`Open ${Math.round(avgOpen*10)/10}% · Revenue ${mo(totalRev)}. Action : répliquer les angles qui vendent, pas juste envoyer plus souvent.`,label:"Bon",cls:"good"};
  return{text:"Travailler l'accroche",detail:`Open ${Math.round(avgOpen*10)/10}%. Action : tester objet + preview text, puis segmenter les non-acheteurs chauds séparément.`,label:"Engagement",cls:"warn"};
}
function crmItemRec(r,tp){
  const rv=num(gv(r,"Revenue")),rec=num(gv(r,"Recipients")),op=num(gv(r,"Open rate")),cl=num(gv(r,"Click rate")),un=num(gv(r,"Unsubscribe rate"));
  const rpr=rec?rv/rec:null,ctor=op?cl/op*100:null;
  if(un>0.5)return"Action : pression trop forte. Réduire fréquence ou resserrer l'audience avant le prochain envoi.";
  if(rec>=100&&rv>0&&rpr<0.2)return`Action : revenue par destinataire faible (${mo(rpr)}). L'audience ouvre peut-être, mais l'offre ou le segment ne vend pas assez.`;
  if(op>=20&&ctor!=null&&ctor<6)return`Action : CTOR faible (${pt(ctor)}). L'objet fait ouvrir, mais le contenu/CTA ne transforme pas l'attention en clic.`;
  if(rv>0&&cl>=2)return tp==="flow"?"Action : flow vendeur. Ne pas modifier brutalement, tester seulement 1 amélioration d'objet/CTA.":"Action : angle vendeur. Le réutiliser dans une nouvelle campagne ou une relance segmentée.";
  if(rec>=100&&op<18)return"Action : problème d'ouverture. Tester objet + preview text, pas le contenu interne en premier.";
  if(op>=20&&cl<1.5)return"Action : l'objet fait ouvrir mais le contenu ne pousse pas assez au clic. Revoir offre, CTA et premier écran.";
  if(tp==="flow"&&rec>=50&&!rv)return"Action : vérifier trigger, délai et offre. Le flow tourne mais ne vend pas encore.";
  if(tp==="campaign"&&rec>=100&&!rv)return"Action : campagne sans CA. Ne pas dupliquer telle quelle, changer angle ou segment.";
  return"Action : garder en observation, pas assez de signal pour décider proprement.";
}

function iso(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function monthStart(d){return`${d.slice(0,7)}-01`;}
function isIso(s){return/^\d{4}-\d{2}-\d{2}$/.test(String(s||""));}
function leap(y){return y%4===0&&(y%100!==0||y%400===0);}
function prevMonthSamePeriod(d){const x=pd(d),endDay=Math.min(x.getDate(),new Date(x.getFullYear(),x.getMonth(),0).getDate()),s=new Date(x.getFullYear(),x.getMonth()-1,1),e=new Date(x.getFullYear(),x.getMonth()-1,endDay);return{s:iso(s),e:iso(e)};}
function fd(d){return isIso(d)?new Date(`${d}T12:00:00`).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function monthLabel(d){return isIso(d)?pd(d).toLocaleDateString("fr-FR",{month:"long"}):"Mois";}
function surl(url){try{const u=new URL(String(url));return u.pathname.replace(/^\/|\/$/g,"")||u.hostname;}catch{return String(url||"");}}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
