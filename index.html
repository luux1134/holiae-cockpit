  <style>
    :root{--bg:#1f1a17;--card:#26211e;--card2:#332e2c;--accent:#f4d8a8;--txt:#fcf8f1;--sec:#908b84;--border:#332e2c;--g:#4caf7d;--r:#e05c5c;--o:#e8a64c;}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);font-family:"Plus Jakarta Sans",system-ui,sans-serif}
    button{font:inherit}
    .wrap{min-height:100vh;background:var(--bg);padding:18px 14px 40px}
    .shell{max-width:1120px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}

    .badge.good{background:rgba(76,175,125,.16);color:var(--g)}.badge.warn{background:rgba(232,166,76,.18);color:var(--o)}.badge.bad{background:rgba(224,92,92,.18);color:var(--r)}
    .adc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px}

    .vskl{font-size:9px;color:var(--sec)}.vskv{font-family:"Cormorant Garamond",serif;font-size:16px;font-style:italic;color:var(--accent)}
    .seoc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:8px}

    .seoc-m{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}

    .klrow{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:7px}
    .klrow-h{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .klrow-n{font-size:12px;color:var(--txt);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .klrow-t{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px}
    .klt-f{background:rgba(244,216,168,.12);color:var(--accent)}.klt-c{background:rgba(76,175,125,.12);color:var(--g)}
    .klrow-m{display:flex;gap:14px;flex-wrap:wrap}
    .klrow-ms{font-size:10px;color:var(--sec);white-space:nowrap}
    .lex-s{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--txt);font-family:"Plus Jakarta Sans",sans-serif;margin-bottom:16px;outline:none}
    .lex-s:focus{border-color:var(--accent)}.lex-s::placeholder{color:var(--sec)}
    .lex-i{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
    .lex-t{font-family:"Cormorant Garamond",serif;font-size:18px;font-style:italic;color:var(--accent);margin-bottom:4px}
    .lex-sh{font-size:9px;color:var(--sec);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
    .lex-d{font-size:12px;color:var(--txt);line-height:1.7}
    .lex-e{font-size:11px;color:var(--sec);margin-top:6px;font-style:italic}

      .wrap{padding:14px 10px 28px}.logo{font-size:20px}
      .kg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .kc{padding:12px;min-height:100px}.kv{font-size:24px}
      .funnel{gap:3px}.fl{font-size:8px}
      .row,.dblk{flex-direction:column;align-items:flex-start}
      .rm{width:100%}.vsg{grid-template-columns:1fr}.adc-m{gap:10px}
    }
  </style>

<body>
<div id="app" class="loading">Chargement du cockpit Holiaē…</div>
<script>
const API_KEY  = "AIzaSyADK3alDzNTsEkbKGVDbrdHYBj0esGF0KU";
const SHEET_ID = "17j732Xnp48sOWR_ignS3pgc5eKL4OPCJwUJWKH5Euv4";
const SHEETS   = {shopify:"Shopify_Daily",ga4:"GA4_Channel",ads:"GoogleAds_Campaigns",st:"GoogleAds_SearchTerms",klav:"Klaviyo",klavD:"Klaviyo_Daily",gscP:"GSC_Pages",gscQ:"GSC_Queries",obj:"Objectifs"};
const CKEY = "holiae-v8", TTL = 36e5;
const app = document.getElementById("app");
const NF = new Intl.NumberFormat("fr-FR");
const EU = new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});

document.addEventListener("DOMContentLoaded",init);
async function init(){
  if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
  try{render(await load());}
  catch(e){const c=rcache();if(c)render(c.d,true);else app.innerHTML=`<div class="wrap"><div class="empty">Erreur chargement.<br>${esc(e.message)}</div></div>`;}
}
async function load(){
  clearOldCache();
  const c=rcache();if(c&&Date.now()-c.t<TTL)return c.d;
  if(!API_KEY||API_KEY==="TA_CLE_ICI")throw new Error("Clé API manquante.");
  const e=await Promise.all(Object.entries(SHEETS).map(async([k,nm])=>[k,await fsheet(nm)]));
  const d=Object.fromEntries(e);
  writeCache(d);
  return d;
}
async function fsheet(nm){
  const u=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(nm)}!A:Z?valueRenderOption=UNFORMATTED_VALUE&key=${API_KEY}`;
  const r=await fetch(u);
  if(!r.ok){if(r.status===400||r.status===404)return[];throw new Error(`${nm}:${r.status}`);}
  return r2o((await r.json()).values||[]);
}
function r2o(v){if(!v.length)return[];const h=v[0].map(x=>String(x||"").trim());return v.slice(1).filter(r=>r.some(Boolean)).map(r=>{const o={};h.forEach((k,i)=>o[k]=isDateHeader(k)?normDate(r[i]):r[i]??"");return o;});}
function rcache(){try{return JSON.parse(sessionStorage.getItem(CKEY)||"");}catch{return null;}}
function clearOldCache(){try{Object.keys(localStorage).filter(k=>k.startsWith("holiae")).forEach(k=>localStorage.removeItem(k));}catch(e){}}
function writeCache(d){try{sessionStorage.setItem(CKEY,JSON.stringify({t:Date.now(),d}));}catch(e){try{sessionStorage.removeItem(CKEY);}catch(_){}}}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(raw,off=false){
  const m=model(raw);
  const h=tabHealth(m);
  app.className="wrap";
  app.innerHTML=`<div class="shell">
  <div class="hdr">
    <div class="logo">Holiaē ✦ Cockpit</div>
    <div class="stamp">${off?"Hors ligne · cache":"Màj · 08h00"}<br><span>${fd(m.ld)}</span></div>
  </div>
  <div class="tabs">
    ${tb("alrt","⚠ Alertes ("+m.alerts.length+")",true,"ta")}
    ${tbh("hier","Hier",h.hier)}${tbh("j7","7 jours",h.j7)}${tbh("mtd","Mois",h.mtd)}
    ${tbh("j28","28 jours",h.j28)}${tbh("m3","3 mois",h.m3)}${tbh("ytd","Année",h.ytd)}
    ${tbh("ads","Ads 7J",h.ads)}${tbh("seo","SEO 28J",h.seo)}${tbh("klv","CRM 28J",h.klv)}${tb("lex","Lexique")}
  </div>
  ${vAlerts(m)}${vHier(m)}${vPer(m,"j7","7 jours glissants","7d","p7d")}
  ${vMtd(m)}${vPer(m,"j28","28 jours glissants","28d","p28d")}
  ${vPer(m,"m3","3 mois glissants","90d","p90d",true)}
  ${vYtd(m)}${vAds(m)}${vSeo(m)}${vKlav(m)}${vLex()}
</div>`;
}
function tb(id,l,on=false,x=""){return`<button class="ht ${x} ${on?"on":""}" onclick="sw('${id}',this)">${l}</button>`;}
function tbh(id,l,health){const dot=health==="g"?"🟢":health==="o"?"🟠":"🔴";return`<button class="ht" onclick="sw('${id}',this)">${dot} ${l}</button>`;}
function tabHealth(m){
  const p=m.p,o=m.ob;
  const h=(ok,warn)=>ok?"g":warn?"o":"r";
  // Hier: commandes J1 vs moy 7J
  const a7=p["7d"].ord?p["7d"].ord/7:null;
  const hier=!a7?"o":h(p.d1.ord>=a7*.85,p.d1.ord>=a7*.7);
  // 7J: conv rate vs prev
  const j7=!p["7d"].cr||!p.p7d.cr?"o":h(p["7d"].cr>=p.p7d.cr*.95,p["7d"].cr>=p.p7d.cr*.85);
  // MTD: projection vs objectif
  const dE=Math.max(1,new Date().getDate()-1),dM=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  const proj=p.mtd.rev?p.mtd.rev/dE*dM:null;
  const mtd=!proj||!o.ca?"o":h(proj>=o.ca*.95,proj>=o.ca*.85);
  // 28J: revenue vs prev
  const j28=!p["28d"].rev||!p.p28d.rev?"o":h(p["28d"].rev>=p.p28d.rev*.95,p["28d"].rev>=p.p28d.rev*.85);
  // 3M: revenue vs prev
  const m3=!p["90d"].rev||!p.p90d.rev?"o":h(p["90d"].rev>=p.p90d.rev*.95,p["90d"].rev>=p.p90d.rev*.85);
  // YTD: projection vs objectif annuel
  const start=new Date(+m.ld.slice(0,4),0,1),el=Math.max(1,Math.ceil((pd(m.ld)-start)/864e5)+1),dY=leap(+m.ld.slice(0,4))?366:365;
  const projY=p.ytd.rev?p.ytd.rev/el*dY:null;
  const ytd=!projY||!o.caY?"o":h(projY>=o.caY*.95,projY>=o.caY*.85);
  // Ads: ROAS global 7J
  const ads=!p["7d"].roas?"o":h(p["7d"].roas>=3,p["7d"].roas>=2);
  // SEO: position moyenne
  const sp=p["28d"].sp,avgPos=sp.length?sp.reduce((a,r)=>a+num(gv(r,"Position")),0)/sp.length:null;
  const seo=!avgPos?"o":h(avgPos<=5,avgPos<=10);
  // CRM: klaviyo 28J vs prev
  const klv=!p["28d"].klav||!p.p28d.klav?"o":h(p["28d"].klav>=p.p28d.klav*.95,p["28d"].klav>=p.p28d.klav*.85);
  return{hier,j7,mtd,j28,m3,ytd,ads,seo,klv};
}
function sw(id,btn){document.querySelectorAll(".hv").forEach(x=>x.classList.remove("on"));document.querySelectorAll(".ht").forEach(x=>x.classList.remove("on"));document.getElementById("v-"+id).classList.add("on");btn.classList.add("on");}

// ── MODEL ─────────────────────────────────────────────────────────────────────
function model(raw){
  const dates=cdates(raw);
  const ld=dates.at(-1)||iso(add(new Date(),-1));
  const d2=iso(add(pd(ld),-1));
  const p={
    d1:rng(raw,ld,ld),d2:rng(raw,d2,d2),
    "7d":rng(raw,iso(add(pd(ld),-6)),ld),p7d:rng(raw,iso(add(pd(ld),-13)),iso(add(pd(ld),-7))),
    "28d":rng(raw,iso(add(pd(ld),-27)),ld),p28d:rng(raw,iso(add(pd(ld),-55)),iso(add(pd(ld),-28))),
    "90d":rng(raw,iso(add(pd(ld),-89)),ld),p90d:rng(raw,iso(add(pd(ld),-179)),iso(add(pd(ld),-90))),
    mtd:rng(raw,ld.slice(0,7)+"-01",ld),ytd:rng(raw,ld.slice(0,4)+"-01-01",ld)
  };
  const ob=gobj(raw.obj||[],ld);
  const al=alerts(p,ob);
  const dq=dqual(p.d1);
  return{raw,dates,ld,d2,p,ob,alerts:al,dq,dec:gdec(p,ob,dq)};
}
function cdates(raw){const a=[];["shopify","ga4","ads"].forEach(k=>(raw[k]||[]).forEach(r=>{const d=gv(r,"Date");if(isIso(d))a.push(d);}));return[...new Set(a)].sort();}
function rng(raw,s,e){
  const sh=bt(raw.shopify||[],s,e),g4=bt(raw.ga4||[],s,e),a=bt(raw.ads||[],s,e),kd=bt(raw.klavD||[],s,e);
  const sess=sm(g4,"Sessions")||sm(sh,"Sessions");
  const ord=sm(sh,"Orders")||sm(a,"Purchases");
  const rev=sm(sh,"Revenue")||sm(a,"Purchase value");
  const cost=sm(a,"Cost"),reva=sm(a,"Purchase value"),klav=sm(kd,"Revenue_Total");
  const pdp=sm(sh,"Product page sessions"),atc=sm(sh,"Add to cart"),chk=sm(sh,"Checkout started");
  return{sess,ord,rev,aov:dv(rev,ord),cr:sess?ord/sess*100:null,cost,reva,roas:dv(reva,cost),cpa:dv(cost,ord),klav,pdp,atc,chk,
    p2a:pdp?atc/pdp*100:null,a2c:atc?chk/atc*100:null,c2o:chk?ord/chk*100:null,
    byType:atype(a),camps:acamps(a),chs:chs(g4),
    klavFlows:sm(kd,"Revenue_Flows"),klavCamps:sm(kd,"Revenue_Campaigns"),
    sp:topR(raw.gscP||[],"Clicks",10),sq:topR(raw.gscQ||[],"Clicks",10)};

    ${kcard("Sessions",fm(p.sess),ref?`Réf. ${fm(ref.sess)}`:"",dl(p.sess,ref?.sess,true))}
    ${kcard("Conv. Rate",pt(p.cr),ref?`Réf. ${pt(ref.cr)}`:"",dl(p.cr,ref?.cr,true,"pt"))}
    ${kcard("Add to Cart",fm(p.atc),ref?`Réf. ${fm(ref.atc)}`:"",dl(p.atc,ref?.atc,true))}
  </div>
  <div class="sg">📈 Publicité</div><div class="kg">
    ${goalKcard("Dépense Ads",mo(p.cost),ref?`Réf. ${mo(ref.cost)}`:"",dl(p.cost,ref?.cost,false),g.bAds,p.cost)}
    ${kcard("ROAS",rt(p.roas),ref?`Réf. ${rt(ref.roas)}`:"",dl(p.roas,ref?.roas,true))}
    ${kcard("CPA",mo(p.cpa),ref?`Réf. ${mo(ref.cpa)}`:"",dl(p.cpa,ref?.cpa,false))}

function kcard(l,val,ref,dh){return`<div class="kc"><div class="kl">${l}</div><div class="kv">${val}</div><div class="kv2">${ref||""}</div><div class="kd">${dh||""}</div></div>`;}
function goalKcard(l,val,ref,dh,obj,cur){
  if(!obj)return kcard(l,val,ref,dh);
  const pct=obj?cur/obj*100:null,w=pct==null?0:Math.max(0,Math.min(100,pct)),cls=pct==null?"gold":pct<70?"bad":pct<90?"warn":"gold";
  return`<div class="kc"><div class="kl">${l}</div><div class="kv">${val}</div><div class="kv2">${ref||""}</div><div class="kd">${dh||""}</div><div class="pb"><div class="pf ${cls}" style="width:${w}%"></div></div><div class="ks">Obj. ${l==="Commandes"?fm(obj):mo(obj)} · ${pt(pct)}</div></div>`;
}
function pc(l,val,ref,prog,sub){const w=prog==null?0:Math.max(0,Math.min(100,prog));const cls=prog==null?"gold":prog<70?"bad":prog<90?"warn":"gold";return`<div class="kc"><div class="kl">${l}</div><div class="kv">${val}</div><div class="kd N">${ref}</div>${prog==null?"":`<div class="pb"><div class="pf ${cls}" style="width:${w}%"></div></div><div class="ks">${pt(prog)} · ${sub}</div>`}</div>`;}

function funnel(p){
  const st=[["Sessions",p.sess,52,""],["Vues PDP",p.pdp,38,p.sess&&p.pdp?pt(p.pdp/p.sess*100)+" ses.":""],["ATC",p.atc,24,p.pdp&&p.atc?pt(p.atc/p.pdp*100)+" PDP":""],["Checkout",p.chk,14,p.atc&&p.chk?pt(p.chk/p.atc*100)+" ATC":""],["Commandes",p.ord,8,p.chk&&p.ord?pt(p.ord/p.chk*100)+" chk":""]];
  if(!st.some(s=>s[1]))return`<div class="empty">Funnel indisponible : données Shopify non remontées.</div>`;
  return`<div class="funnel">${st.map(s=>`<div class="fstep"><div class="fl">${s[0]}</div><div class="fv">${fm(s[1])}</div><div class="fs">${s[3]}</div><div class="fb" style="height:${s[2]}px"></div></div>`).join("")}</div>`;
}

function camps(p){
  const cl=Object.values(p.camps||{}).sort((a,b)=>b.cost-a.cost);
  if(!cl.length)return`<div class="empty">Aucune donnée campagne sur cette période.</div>`;
  return cl.map(c=>`<div class="row"><span class="rn">${esc(c.name)}</span><div class="rm"><span class="rs">${esc(c.type)}</span><span class="rs">Ventes <span style="color:var(--accent)">${fm(c.pur)}</span></span><span class="rs">ROAS <span style="color:${rc(c.roas)}">${rt(c.roas)}</span></span><span class="rs">Dépense ${mo(c.cost)}</span></div></div>`).join("");
}

function seoR(p){return`<div class="sg">🔍 Top pages SEO</div>${p.sp.map(r=>`<div class="row"><span class="rn">${esc(surl(gv(r,"Page")))}</span><div class="rm"><span class="rs">Pos. <span style="color:var(--accent)">${rt(num(gv(r,"Position")))}</span></span><span class="rs">Clics ${fm(num(gv(r,"Clicks")))}</span><span class="rs">CTR ${pt(num(gv(r,"CTR")))}</span></div></div>`).join("")||`<div class="empty">Pas de données SEO.</div>`}`;}
function chR(p){const tot=Object.values(p.chs).reduce((a,b)=>a+b,0);return`<div class="sg">🌐 Trafic par canal</div>${Object.entries(p.chs).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([n,s])=>`<div class="row"><span class="rn">${esc(n)}</span><div class="rm"><span class="rs">${fm(s)} sessions</span><span class="rs">${pt(tot?s/tot*100:null)}</span></div></div>`).join("")||`<div class="empty">Aucune donnée canal.</div>`}`;}


// ── OBJ BAR ───────────────────────────────────────────────────────────────────
function objBar(m,key,p){
  const o=m.ob;
  if(!o.ca&&!o.ord&&!o.bAds)return"";
  const dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  // Pro-rate the objective to the period
  let ratio,label;
  if(key==="d1"){ratio=1/dM;label="J-1";}
  else if(key==="7d"){ratio=7/dM;label="7J";}
  else if(key==="28d"){ratio=28/dM;label="28J";}
  else if(key==="90d")return"";
  else{
    const dE=Math.max(1,pd(m.ld).getDate());
    const proj=p.rev?p.rev/dE*dM:null;
    return`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${o.ca?miniPg("CA MTD",mo(p.rev),mo(o.ca),o.ca?p.rev/o.ca*100:null,proj?`Proj. ${mo(proj)}`:""):""}
      ${o.ord?miniPg("Commandes MTD",fm(p.ord),fm(o.ord),o.ord?p.ord/o.ord*100:null,""):""}
      ${o.bAds?miniPg("Budget Ads MTD",mo(p.cost),mo(o.bAds),o.bAds?p.cost/o.bAds*100:null,""):""}
    </div>`;
  }
  const caO=o.ca?o.ca*ratio:null;
  const ordO=o.ord?o.ord*ratio:null;
  const bO=o.bAds?o.bAds*ratio:null;
  return`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    ${caO?miniPg("CA "+label,mo(p.rev),mo(caO),caO?p.rev/caO*100:null,""):""}
    ${ordO?miniPg("Commandes "+label,fm(p.ord),ordO<1?`~${Math.round(ordO*10)/10}`:fm(Math.round(ordO)),ordO?p.ord/ordO*100:null,""):""}
    ${bO?miniPg("Budget Ads "+label,mo(p.cost),mo(bO),bO?p.cost/bO*100:null,""):""}
  </div>`;
}
function goalSet(m,key){
  const o=m.ob,dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  if(!o.ca&&!o.ord&&!o.bAds)return{};
  const days=key==="d1"?1:key==="7d"?7:key==="28d"?28:key==="90d"?90:null;
  if(!days)return{};
  const ratio=days/dM;
  return{ca:o.ca?o.ca*ratio:null,ord:o.ord?o.ord*ratio:null,bAds:o.bAds?o.bAds*ratio:null};
}
function miniPg(l,val,obj,pv,sub){
  const w=pv==null?0:Math.max(0,Math.min(100,pv));
  const cls=pv==null?"gold":pv<70?"bad":pv<90?"warn":"gold";
  return`<div style="flex:1;min-width:130px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 13px">
    <div style="font-size:8px;color:var(--sec);letter-spacing:.2em;text-transform:uppercase;margin-bottom:5px">${l}</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--accent);margin-bottom:2px">${val}</div>
    <div style="font-size:9px;color:var(--sec);margin-bottom:5px">Obj. ${obj}</div>
    <div class="pb"><div class="pf ${cls}" style="width:${w}%"></div></div>
    ${sub?`<div style="font-size:9px;color:var(--sec);margin-top:3px">${sub}</div>`:""}
  </div>`;
}

function klavPeriod(p,label){
  const has=p&&((p.klav||0)||(p.klavFlows||0)||(p.klavCamps||0));
  if(!has)return`<div class="sg">📧 CRM · ${esc(label)}</div><div class="empty">Aucune donnée Klaviyo sur cette période.</div>`;
  return`<div class="sg">📧 CRM · ${esc(label)}</div><div class="kg">
    ${kcard("Klaviyo Revenue",mo(p.klav),"Flows + campagnes","")}

}

function klavTop(m,p){
  // Period revenue from klaviyoDaily (period-specific)
  const pRev=p?p.klav:0;

  const pCamps=p?p.klavCamps:0;

  const top=rows.filter(r=>num(gv(r,"Revenue"))>0).sort((a,b)=>num(gv(b,"Revenue"))-num(gv(a,"Revenue"))).slice(0,4);
  const periodBlock=hasPeriod?`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">

      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--accent)">${mo(pRev)}</div>
    </div>
    ${pFlows?`<div style="flex:1;min-width:80px;background:var(--card2);border-radius:6px;padding:10px 12px">
      <div style="font-size:8px;color:var(--sec);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px">Flows</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--accent)">${mo(pFlows)}</div>
    </div>`:""}
    ${pCamps?`<div style="flex:1;min-width:80px;background:var(--card2);border-radius:6px;padding:10px 12px">
      <div style="font-size:8px;color:var(--sec);letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px">Campagnes</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--accent)">${mo(pCamps)}</div>
    </div>`:""}
  </div>`:"";
  if(!top.length)return periodBlock+`<div class="empty">Top flows/campagnes indisponibles (données snapshot 28J).</div>`;
  const nameBlock=`<div style="font-size:9px;color:var(--sec);letter-spacing:.15em;text-transform:uppercase;margin:8px 0 6px">Top performers · snapshot 28J</div>`+top.map(r=>{
    const tp=String(gv(r,"Type")||"").toLowerCase();
    const or=num(gv(r,"Open rate")),cr=num(gv(r,"Click rate"));
    return`<div class="row"><span class="rn">${esc(gv(r,"Name")||"—")}</span><div class="rm">
      <span class="rs"><span class="klrow-t ${tp==="flow"?"klt-f":"klt-c"}" style="padding:1px 6px;border-radius:3px;font-size:8px">${tp==="flow"?"Flow":"Camp."}</span></span>

      ${or?`<span class="rs">Open ${pt(or)}</span>`:""}
      ${cr?`<span class="rs">Click ${pt(cr)}</span>`:""}

  }).join("");
  return periodBlock+nameBlock;
}

function rhythmHero(m){
  const o=m.ob,p=m.p.mtd;
  if(!o.ca)return"";
  const dE=Math.max(1,pd(m.ld).getDate());
  const dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  const daysLeft=Math.max(1,dM-dE);
  const current=p.rev/Math.max(1,dE);
  const need=Math.max(0,o.ca-p.rev)/daysLeft;
  const ok=need===0;
  return`<div class="dblk" style="border-color:${ok?"rgba(76,175,125,.35)":"rgba(244,216,168,.45)"};background:${ok?"rgba(76,175,125,.10)":"rgba(244,216,168,.10)"}">
    <div><div class="dtit">Indicateur principal · objectif mensuel</div><div class="dmain">${ok?"Objectif mensuel atteint":`Il faut ${mo(need)}/jour pour atteindre l'objectif`}</div><div class="ks" style="margin-top:6px">CA MTD ${mo(p.rev)} · Objectif ${mo(o.ca)} · ${daysLeft} jours restants · Rythme actuel ${mo(current)}/j</div></div>
    <span class="badge ${ok?"good":"warn"}">${pt(o.ca?p.rev/o.ca*100:null)}</span>
  </div>`;
}

function seoGlobalRec(pages,queries){
  if(!pages.length)return{text:"Données GSC insuffisantes",detail:"Connecter Google Search Console pour voir les recommandations.",label:"Données",cls:"warn"};
  const avgPos=pages.reduce((a,r)=>a+num(gv(r,"Position")),0)/pages.length;
  const tc=pages.reduce((a,r)=>a+num(gv(r,"Clicks")),0);
  const ti=pages.reduce((a,r)=>a+num(gv(r,"Impressions")),0);
  const avgCtr=ti?tc/ti*100:0;
  const qWins=pages.filter(r=>num(gv(r,"Position"))>=4&&num(gv(r,"Position"))<=10&&num(gv(r,"Impressions"))>100).length;
  if(avgPos<=4&&avgCtr>=3)return{text:"SEO en bonne santé",detail:`Position moyenne ${Math.round(avgPos*10)/10} · CTR ${Math.round(avgCtr*10)/10}%. Maintenir la cadence éditoriale.`,label:"Bon",cls:"good"};
  if(qWins>=2)return{text:`${qWins} Quick Wins à saisir`,detail:`${qWins} pages en position 4-10 avec du volume. Enrichir le contenu pour passer en top 3.`,label:"Action",cls:"warn"};
  if(avgPos<=7)return{text:"Améliorer le CTR",detail:`Position moyenne ${Math.round(avgPos*10)/10} mais CTR ${Math.round(avgCtr*10)/10}%. Retravaille les titles et méta descriptions.`,label:"CTR",cls:"warn"};
  return{text:"Travail de fond requis",detail:`Position moyenne ${Math.round(avgPos*10)/10}. Investir dans le contenu et le maillage interne.`,label:"Contenu",cls:"bad"};
}

function crmGlobalRec(m){
  const rows=m.raw.klav||[];
  if(!rows.length)return{text:"Données CRM insuffisantes",detail:"Connecter Klaviyo pour voir les recommandations.",label:"Données",cls:"warn"};
  const totalRev=sm(rows,"Revenue");
  const totalRec=sm(rows,"Recipients");
  const wOpen=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Open rate")),0);
  const avgOpen=totalRec?wOpen/totalRec:0;
  const wUnsub=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*num(gv(r,"Unsubscribe rate")),0);
  const avgUnsub=totalRec?wUnsub/totalRec:0;
  const flows=rows.filter(r=>String(gv(r,"Type")||"").toLowerCase()==="flow");
  const flowRev=sm(flows,"Revenue");
  const flowShare=totalRev?flowRev/totalRev*100:0;
  if(avgUnsub>0.5)return{text:"Attention aux désinscriptions",detail:`Taux de désinscription moyen ${Math.round(avgUnsub*10)/10}%. Revoir la fréquence et le ciblage des campagnes.`,label:"Urgence",cls:"bad"};
  if(flowShare<30&&totalRev>0)return{text:"Activer plus de flows",detail:`Les flows ne représentent que ${Math.round(flowShare)}% du CA CRM. Mettre en place abandon panier, post-achat, win-back.`,label:"Flows",cls:"warn"};
  if(avgOpen>=20&&totalRev>0)return{text:"CRM performant",detail:`Open rate ${Math.round(avgOpen*10)/10}% · Revenue ${mo(totalRev)}. Augmenter la fréquence des campagnes.`,label:"Bon",cls:"good"};
  return{text:"Améliorer l'engagement",detail:`Open rate ${Math.round(avgOpen*10)/10}%. Tester de nouveaux objets d'email et segmenter la liste.`,label:"Engagement",cls:"warn"};
}

function alerts(p,o){
  const a=[],d1=p.d1,s7=p["7d"],p7=p.p7d,mtd=p.mtd;
  const a7O=s7.ord?s7.ord/7:null,a7R=s7.rev?s7.rev/7:null;
  if(!d1.sess&&!d1.ord)a.push({lv:"c",label:"Data",title:"Données Shopify manquantes",body:"Sessions et commandes à zéro sur J-1. Vérifier la connexion API Shopify."});
  if(a7O&&d1.ord<a7O*.7)a.push({lv:"c",label:"Critique",title:"Commandes en chute",body:`Hier ${fm(d1.ord)} vs moyenne 7J ${fm(a7O)}/j (−${pt((1-d1.ord/a7O)*100)}).`});
  if(a7R&&d1.rev<a7R*.7)a.push({lv:"c",label:"Critique",title:"CA en chute",body:`Hier ${mo(d1.rev)} vs moyenne 7J ${mo(a7R)}/j.`});
  if(d1.roas&&s7.roas&&d1.roas<s7.roas*.65)a.push({lv:"c",label:"Ads",title:"ROAS en chute",body:`ROAS hier ${rt(d1.roas)} vs moyenne 7J ${rt(s7.roas)}.`});
  if(s7.p2a!=null&&s7.p2a<1)a.push({lv:"c",label:"CRO",title:"PDP → ATC trop faible",body:`Taux ajout panier 7J : ${pt(s7.p2a)}. Objectif 1,5%+. Retravailler la page produit.`});
  if(o.ca){const dE=Math.max(1,new Date().getDate()-1),dM=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(),proj=mtd.rev?mtd.rev/dE*dM:null;if(proj&&proj<o.ca*.85)a.push({lv:"c",label:"MTD",title:"Projection MTD insuffisante",body:`Projection ${mo(proj)} vs objectif ${mo(o.ca)} → écart ${mo(o.ca-proj)}.`});else if(proj&&proj<o.ca*.95)a.push({lv:"i",label:"Info",title:"Projection MTD légèrement en retard",body:`Projection ${mo(proj)} (${pt(proj/o.ca*100)} de l'objectif).`});
  // Rythme requis
  if(o.ca&&mtd.rev!=null){const daysLeft=Math.max(1,dM-dE);const need=Math.max(0,o.ca-mtd.rev)/daysLeft;if(need>0)a.push({lv:"i",label:"Rythme",title:`Il faut ${mo(need)}/jour pour atteindre l'objectif`,body:`CA MTD ${mo(mtd.rev)} · Objectif ${mo(o.ca)} · ${daysLeft} jours restants · Rythme actuel ${mo(mtd.rev/Math.max(1,dE))}/j.`});else a.push({lv:"i",label:"Rythme",title:"Objectif mensuel déjà atteint ✦",body:`CA MTD ${mo(mtd.rev)} dépasse l'objectif ${mo(o.ca)}.`});}}
  if(s7.cr&&p7.cr&&s7.cr<p7.cr*.85)a.push({lv:"w",label:"Warning",title:"Taux de conversion en baisse",body:`Conv. rate 7J ${pt(s7.cr)} vs ${pt(p7.cr)} semaine précédente.`});
  if(a7O&&d1.ord<a7O*.85&&d1.ord>=a7O*.7)a.push({lv:"w",label:"Warning",title:"Commandes en légère baisse",body:`Hier ${fm(d1.ord)} vs moyenne 7J ${fm(a7O)}/j.`});
  if(s7.a2c!=null&&s7.a2c<50)a.push({lv:"w",label:"Panier",title:"ATC → Checkout faible",body:`${pt(s7.a2c)} des ajouts panier arrivent au checkout.`});
  if(s7.c2o!=null&&s7.c2o<30)a.push({lv:"w",label:"Checkout",title:"Checkout → Commandes faible",body:`${pt(s7.c2o)} des checkouts aboutissent à une commande.`});
  if(o.bAds){const dE=Math.max(1,new Date().getDate()-1),dM=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(),norm=o.bAds*(dE/dM);if(mtd.cost>norm*1.2)a.push({lv:"w",label:"Budget",title:"Budget Ads trop rapide",body:`Dépense MTD ${mo(mtd.cost)} vs rythme attendu ${mo(norm)}.`});if(mtd.cost&&mtd.cost<norm*.7)a.push({lv:"i",label:"Budget",title:"Budget Ads sous-consommé",body:`Dépense MTD ${mo(mtd.cost)} vs rythme attendu ${mo(norm)}.`});}
  const sr=s7.byType["SEARCH"]||{},pm=s7.byType["PMAX"]||{};
  if(sr.roas&&pm.roas&&pm.roas<sr.roas*.6)a.push({lv:"w",label:"Ads",title:"Search surperforme PMAX",body:`Search ROAS ${rt(sr.roas)} vs PMAX ${rt(pm.roas)}. Envisager rééquilibrage.`});
  return a.slice(0,12);
}
function dqual(d1){const m=[];if(!d1.sess)m.push("sessions");if(!d1.ord)m.push("commandes");if(!d1.cost)m.push("Ads");if(!d1.klav)m.push("Klaviyo");if(!m.length)return{level:"ok",label:"Data OK"};if(m.length<=2)return{level:"warn",label:"Data partielle : "+m.join(", ")};return{level:"bad",label:"Data à vérifier"};}
function gdec(p,o,dq){const s7=p["7d"],p7=p.p7d,d1=p.d1;if(dq.level==="bad")return{text:"Priorité data",detail:"Trop de sources vides. Vérifier les syncs."};if(s7.p2a!=null&&s7.p2a<1)return{text:"Priorité page produit",detail:`PDP → ATC à ${pt(s7.p2a)} sur 7J. La page ne convertit pas assez.`};if(s7.a2c!=null&&s7.a2c<50)return{text:"Priorité panier",detail:`ATC → Checkout à ${pt(s7.a2c)}. Friction entre panier et checkout.`};if(s7.c2o!=null&&s7.c2o<30)return{text:"Priorité checkout",detail:`Checkout → Commandes à ${pt(s7.c2o)}. Le paiement ou la réassurance bloque.`};if(d1.roas&&s7.roas&&d1.roas<s7.roas*.65)return{text:"Priorité publicité",detail:`ROAS hier ${rt(d1.roas)} vs moyenne 7J ${rt(s7.roas)}.`};if(s7.cr&&p7.cr&&s7.cr<p7.cr*.85)return{text:"Priorité conversion",detail:`Conv. rate en baisse : ${pt(s7.cr)} vs ${pt(p7.cr)}.`};return{text:"Tout roule ✦",detail:"Surveiller PDP → ATC et équilibre PMAX / Search."};}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fl(q){const s=q.toLowerCase().trim(),it=document.querySelectorAll("#li .lex-i");let c=0;it.forEach(e=>{const show=!s||e.dataset.s.includes(s);e.style.display=show?"":"none";if(show)c++;});document.getElementById("le").style.display=c===0?"":"none";}
function bt(rows,s,e){return rows.filter(r=>isIso(gv(r,"Date"))&&gv(r,"Date")>=s&&gv(r,"Date")<=e);}
function topR(rows,f,l){return[...rows].sort((a,b)=>num(gv(b,f))-num(gv(a,f))).slice(0,l);}
function topSearchTerms(rows,l){
  const out={};
  rows.forEach(r=>{
    const term=String(gv(r,"Search term")||gv(r,"Keyword")||gv(r,"Query")||"").trim();
    if(!term)return;
    const key=term.toLowerCase();
    if(!out[key])out[key]={term,cost:0,clicks:0,impr:0,pur:0,value:0};
    out[key].cost+=num(gv(r,"Cost")||gv(r,"Cout"));
    out[key].clicks+=num(gv(r,"Clicks")||gv(r,"Clics"));
    out[key].impr+=num(gv(r,"Impressions"));
    out[key].pur+=num(gv(r,"Purchases")||gv(r,"Conversions"));
    out[key].value+=num(gv(r,"Purchase value")||gv(r,"Revenue_Ads"));
  });
  return Object.values(out).sort((a,b)=>b.clicks-a.clicks||b.cost-a.cost).slice(0,l);
}
function termRec(r){
  if(r.pur>0)return"Convertit : garder / isoler en exact si le volume monte.";
  if(r.cost>=20&&r.clicks>=10)return"Dépense sans vente : surveiller ou exclure si l'intention est faible.";
  if(r.clicks>=5)return"Volume utile : surveiller encore avant décision.";
  return"Peu de données.";
}
function gv(row,n){return row?.[n]??"";}
function sm(rows,f){return rows.reduce((a,r)=>a+num(gv(r,f)),0);}
function num(x){if(x==null||x==="")return 0;const v=Number(String(x).replace(/\s/g,"").replace(",","."));return Number.isFinite(v)?v:0;}
function dv(a,b){return b?a/b:null;}
function mo(x){return x?EU.format(x):"—";}
function fm(x){return x?NF.format(Math.round(x)):"—";}
function rt(x){return x?NF.format(Math.round(x*100)/100):"—";}
function pt(x){return x==null||!Number.isFinite(x)?"—":`${NF.format(Math.round(x*10)/10)}%`;}
function dl(cur,old,pu=true,u=""){if(cur==null||old==null||!old)return`<span class="N">—</span>`;const raw=u==="pt"?cur-old:(cur-old)/Math.abs(old)*100;const g=pu?raw>=0:raw<=0;return`<span class="${g?"G":"R"}">${raw>=0?"▲":"▼"} ${u==="pt"?`${Math.round(raw*10)/10}pt`:pt(Math.abs(raw))}</span>`;}
function nt(t){const s=String(t||"").toUpperCase();if(s.includes("PERFORMANCE_MAX")||s.includes("PMAX"))return"PMAX";if(s.includes("SEARCH"))return"SEARCH";if(s.includes("BRAND"))return"BRAND";return s||"OTHER";}
function isDateHeader(k){return["Date","date"].includes(String(k||"").trim());}
function normDate(v){
  if(v==null||v==="")return"";
  if(typeof v==="number"||/^\d{5}(\.\d+)?$/.test(String(v))){
    const n=Number(v),d=new Date(Date.UTC(1899,11,30)+n*864e5);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=s.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return s;
}
function pd(s){const[y,m,d]=String(s).slice(0,10).split("-").map(Number);return new Date(y,m-1,d);}
function add(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function iso(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function monthStart(d){return`${d.slice(0,7)}-01`;}
function isIso(s){return/^\d{4}-\d{2}-\d{2}$/.test(String(s||""));}
function leap(y){return y%4===0&&(y%100!==0||y%400===0);}
function fd(d){return isIso(d)?new Date(`${d}T12:00:00`).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function surl(url){try{const u=new URL(String(url));return u.pathname.replace(/^\/|\/$/g,"")||u.hostname;}catch{return String(url||"");}}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
