    .ht.ta{color:var(--r)}.ht.ta.on{background:#c0392b;color:var(--txt)}

    .advice-v.fix{background:rgba(224,92,92,.18);color:var(--r)}.advice-v.investigate{background:rgba(232,166,76,.18);color:var(--o)}
    .advice-v.hold{background:rgba(244,216,168,.15);color:var(--accent)}.advice-v.scale{background:rgba(76,175,125,.16);color:var(--g)}
    .advice-c{font-size:9px;letter-spacing:.12em;text-transform:uppercase;border-radius:4px;padding:4px 10px;font-weight:700;white-space:nowrap;background:rgba(144,139,132,.15);color:var(--sec)}
    .advice-c.high{background:rgba(76,175,125,.16);color:var(--g)}.advice-c.medium{background:rgba(232,166,76,.18);color:var(--o)}.advice-c.low{background:rgba(224,92,92,.18);color:var(--r)}
    .advice-pr{font-size:13px;color:var(--txt);line-height:1.45;font-weight:500;min-width:0;word-break:break-word}
    .advice-p{font-size:12px;color:var(--txt);line-height:1.7;margin:0 0 9px}
    .advice-p:last-child{margin-bottom:0}
    .lex-s{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--txt);font-family:"Plus Jakarta Sans",sans-serif;margin-bottom:16px;outline:none}
    .lex-s:focus{border-color:var(--accent)}.lex-s::placeholder{color:var(--sec)}
    .lex-i{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
    .lex-t{font-family:"Cormorant Garamond",serif;font-size:18px;font-style:italic;color:var(--accent);margin-bottom:4px}
    .lex-sh{font-size:9px;color:var(--sec);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
    .lex-d{font-size:12px;color:var(--txt);line-height:1.7}
    .lex-e{font-size:11px;color:var(--sec);margin-top:6px;font-style:italic}
    .empty{background:var(--card);border:1px dashed var(--border);border-radius:8px;padding:16px;color:var(--sec);font-size:12px;line-height:1.6;margin-bottom:8px}
    .loading{min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--accent);font-family:"Cormorant Garamond",serif;font-size:28px;font-style:italic}
    @media(max-width:640px){
      .wrap{padding:14px 10px 28px}.logo{font-size:20px}
      .kg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .kc{padding:12px;min-height:100px}.kv{font-size:24px}
      .funnel{gap:3px}.fl{font-size:8px}
      .row,.dblk{flex-direction:column;align-items:flex-start}
      .rn{white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word}

      .rm{width:100%;justify-content:flex-start;gap:7px}.vsg{grid-template-columns:1fr}.adc-m{gap:10px}
      .adc-h,.klrow-h,.seoc-h{align-items:flex-start}

      .advice-h{flex-direction:column;align-items:flex-start}.advice-d{white-space:normal}.advice-p{font-size:11px}
      .ab{margin-left:0}
    }
  </style>
</head>
<body>
<div id="app" class="loading">Chargement du cockpit Holiaē…</div>
<script>
const API_KEY  = "AIzaSyADK3alDzNTsEkbKGVDbrdHYBj0esGF0KU";
const SHEET_ID = "17j732Xnp48sOWR_ignS3pgc5eKL4OPCJwUJWKH5Euv4";
const SHEETS   = {shopify:"Shopify_Daily",ga4:"GA4_Channel",ads:"GoogleAds_Campaigns",adsFull:"GAds_Campaigns",st:"GoogleAds_SearchTerms",klav:"Klaviyo",klavD:"Klaviyo_Daily",klavA:"Klaviyo_Attribution_Daily",gscP:"GSC_Pages",gscQ:"GSC_Queries",gscPP:"GSC_Pages_Previous",gscQP:"GSC_Queries_Previous",obj:"Objectifs",advice:"ARIS_Advice",adamAdvice:"ADAM_Advice"};
const CKEY = "holiae-v32", TTL = 36e5;
const PRODUCT_COGS = 82;
const SHIPPING_COST = 11;
const VAT_RATE = 0.20;
const PAYMENT_RATE = 0.015;
const PAYMENT_FIXED = 0.25;
const app = document.getElementById("app");
const NF = new Intl.NumberFormat("fr-FR");
const EU = new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
let CAL_MONTH = "";
let HOLIAE_MODEL = null;

document.addEventListener("DOMContentLoaded",init);
async function init(){
  if("serviceWorker"in navigator){
    navigator.serviceWorker.register("sw.js").then(reg=>reg.update()).catch(()=>{});
    navigator.serviceWorker.addEventListener("controllerchange",()=>{if(!sessionStorage.getItem("swReloaded")){sessionStorage.setItem("swReloaded","1");location.reload();}});
  }
  try{render(await load());}
  catch(e){const c=rcache();if(c)render(c.d,true);else app.innerHTML=`<div class="wrap"><div class="empty">Erreur chargement.<br>${esc(e.message)}</div></div>`;}
}
async function load(){
  clearOldCache();
  const c=rcache();if(c&&Date.now()-c.t<TTL)return c.d;
  if(!API_KEY||API_KEY==="TA_CLE_ICI")throw new Error("Clé API manquante.");
  const e=await Promise.all(Object.entries(SHEETS).map(async([k,nm])=>[k,await fsheet(nm)]));
  const d=Object.fromEntries(e);
  writeCache(d);
  return d;
}
async function fsheet(nm){
  const u=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(nm)}!A:Z?valueRenderOption=UNFORMATTED_VALUE&key=${API_KEY}`;
  const r=await fetch(u);
  if(!r.ok){if(r.status===400||r.status===404)return[];throw new Error(`${nm}:${r.status}`);}
  return r2o((await r.json()).values||[]);
}
function r2o(v){if(!v.length)return[];const h=v[0].map(x=>String(x||"").trim());return v.slice(1).filter(r=>r.some(Boolean)).map(r=>{const o={};h.forEach((k,i)=>o[k]=isDateHeader(k)?normDate(r[i]):r[i]??"");return o;});}
function rcache(){try{return JSON.parse(sessionStorage.getItem(CKEY)||"");}catch{return null;}}
function clearOldCache(){try{Object.keys(localStorage).filter(k=>k.startsWith("holiae")).forEach(k=>localStorage.removeItem(k));}catch(e){}}
function writeCache(d){try{sessionStorage.setItem(CKEY,JSON.stringify({t:Date.now(),d}));}catch(e){try{sessionStorage.removeItem(CKEY);}catch(_){}}}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(raw,off=false){
  const m=model(raw);
  HOLIAE_MODEL=m;
  if(!CAL_MONTH)CAL_MONTH=isNewMonthWaiting(m)?todayIso().slice(0,7):m.ld.slice(0,7);
  const h=tabHealth(m);
  const alertCount=morningAlerts(m.alerts.filter(a=>a.label!=="Rythme"&&!isOpp(a)),m).length;
  app.className="wrap";
  app.innerHTML=`<div class="shell">
  <div class="hdr">
    <div class="logo">Holiaē ✦ Cockpit</div>
    <div class="stamp">${off?"Hors ligne · cache":"Màj · 07h00"}<br><span>${fd(m.ld)}</span></div>
  </div>
  <div class="tabs">
    ${tb("alrt","⚠ Alertes ("+alertCount+")",true,"ta")}
    ${tb("aris","🔵 ARIS",false,"ai")}
    ${tbh("hier","Hier",h.hier)}${tbh("mtd",mtdTabLabel(m),h.mtd)}${tbh("j7","7 jours",h.j7)}
    ${tbh("j28","28 jours",h.j28)}${tbh("m3","3 mois",h.m3)}${tbh("ytd","Année",h.ytd)}
    ${tbh("ads","Ads 7J",h.ads)}${tbh("seo","SEO 28J",h.seo)}${tbh("klv","CRM 28J",h.klv)}${tb("lex","Lexique")}
  </div>
  ${vAlerts(m)}${vArisInsight(m)}${vHier(m)}${vPer(m,"j7","7 jours glissants","7d","p7d")}
  ${vMtd(m)}${vPer(m,"j28","28 jours glissants","28d","p28d")}
  ${vPer(m,"m3","3 mois glissants","90d","p90d",true)}
  ${vYtd(m)}${vAds(m)}${vSeo(m)}${vKlav(m)}${vLex()}
</div>`;
}
function tb(id,l,on=false,x=""){return`<button class="ht ${x} ${on?"on":""}" onclick="sw('${id}',this)">${l}</button>`;}
function tbh(id,l,health){const dot=health==="g"?"🟢":health==="o"?"🟠":"🔴";return`<button class="ht" onclick="sw('${id}',this)">${dot} ${l}</button>`;}
function tabHealth(m){
  const p=m.p,o=m.ob;
  const h=(ok,warn)=>ok?"g":warn?"o":"r";
  const dE=Math.max(1,pd(m.ld).getDate()),dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate();
  const orderHealth=(key,days)=>{
    if(!o.ord)return"o";
    const target=o.ord*(days/dM);
    return h(p[key].ord>=target*.95,p[key].ord>=target*.85);
  };
  // Business tabs: commandes vs objectif commandes proratisé
  const hier=orderHealth("d1",1);
  const j7=orderHealth("7d",7);
  const mtd=!o.ord||!p.mtd.ord?"o":h((p.mtd.ord/dE*dM)>=o.ord*.95,(p.mtd.ord/dE*dM)>=o.ord*.85);
  const j28=orderHealth("28d",28);
  const m3=orderHealth("90d",90);
  // YTD: projection commandes annuelle vs objectif annuel estimé depuis l'objectif mensuel
  const start=new Date(+m.ld.slice(0,4),0,1),el=Math.max(1,Math.ceil((pd(m.ld)-start)/864e5)+1),dY=leap(+m.ld.slice(0,4))?366:365;
  const ordY=o.ord?o.ord*12:null,projOrdY=p.ytd.ord?p.ytd.ord/el*dY:null;

function salesCalendar(m){
  const ym=CAL_MONTH||m.ld.slice(0,7),y=+ym.slice(0,4),mo0=+ym.slice(5,7)-1;
  const first=new Date(y,mo0,1),days=new Date(y,mo0+1,0).getDate(),offset=(first.getDay()+6)%7;
  const orders={};
  (m.raw.shopify||[]).forEach(r=>{const d=gv(r,"Date");if(String(d).slice(0,7)===ym)orders[d]=(orders[d]||0)+num(gv(r,"Orders"));});
  const waiting=isNewMonthWaiting(m)&&ym===todayIso().slice(0,7)&&!Object.keys(orders).length;
  const cells=[];
  for(let i=0;i<offset;i++)cells.push(`<div></div>`);
  for(let d=1;d<=days;d++){
    const isoDay=`${ym}-${String(d).padStart(2,"0")}`,o=Math.round(orders[isoDay]||0),dots=Math.min(o,9);
    const wd=new Date(y,mo0,d).toLocaleDateString("fr-FR",{weekday:"short"}).slice(0,3);
    cells.push(`<div class="cal-d ${isoDay===m.ld?"today":""}"><div class="cal-n"><span>${d}</span><span>${wd}</span></div><div class="cal-o">${Array.from({length:dots}).map(()=>`<span class="sale-dot"></span>`).join("")}${o>9?`<span class="sale-more">+${o-9}</span>`:""}</div></div>`);
  }
  return`<div class="cal"><div class="cal-h"><button class="cal-b" onclick="moveCal(-1)">‹</button><div class="cal-t">${first.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}</div><button class="cal-b" onclick="moveCal(1)">›</button></div>${waiting?`<div class="empty">Aucune donnée Shopify pour ${ym} pour l'instant. Utilise ‹ pour revoir le dernier mois disponible.</div>`:""}<div class="cal-g">${["lun","mar","mer","jeu","ven","sam","dim"].map(x=>`<div class="cal-w">${x}</div>`).join("")}${cells.join("")}</div><div class="ks">1 point vert = 1 vente. Les journées sans point n'ont aucune commande enregistrée.</div></div>`;
}
function moveCal(n){
  if(!HOLIAE_MODEL)return;
  const y=+CAL_MONTH.slice(0,4),m=+CAL_MONTH.slice(5,7)-1,d=new Date(y,m+n,1);
  CAL_MONTH=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  const el=document.getElementById("sales-calendar");
  if(el)el.innerHTML=salesCalendar(HOLIAE_MODEL);
}

function isOpp(a){return /bonne nouvelle/i.test(a.label||"")||(a.label==="SEO"&&/opportunit|quick win/i.test(a.title||""));}

function morningAlerts(alerts,m){
  const stale=isNewMonthWaiting(m);
  const filtered=(alerts||[]).filter(a=>{
    if(stale&&["Budget","MTD","Rythme"].includes(a.label))return false;
    if(a.label==="SEO"&&a.lv!=="c")return false;
    return true;
  });
  const score=a=>{
    const t=String((a.label||"")+" "+(a.title||"")).toLowerCase();
    if(t.includes("profit")||t.includes("contribution"))return 100;
    if(t.includes("pdp")||t.includes("atc")||t.includes("panier")||t.includes("checkout")||t.includes("cro"))return 90;
    if(t.includes("ads")||t.includes("search")||t.includes("roas")||t.includes("cac"))return 80;
    if(t.includes("conversion"))return 65;
    if(t.includes("aucune commande")||t.includes("commandes")||t.includes("ca en chute"))return 60;
    if(a.lv==="c")return 55;
    if(a.lv==="w")return 40;
    return 20;
  };
  return filtered.sort((a,b)=>score(b)-score(a)).slice(0,3);
}

function bigMove(m,list){
  const has=t=>list.find(a=>String(a.title||"").toLowerCase().includes(t));
  const byLabel=l=>list.find(a=>String(a.label||"").toLowerCase().includes(l));
  const p=m.p;
  const critical=list.find(a=>a.lv==="c");
  if(has("aucune commande"))return{label:"Urgent",cls:"bad",title:"Vérifier le tunnel d'achat avant tout",action:"Priorité absolue : paiement, checkout, stock, tracking Shopify et campagnes actives. Ne pas optimiser les pubs tant que l'achat peut être cassé."};
  if(has("commandes en chute"))return{label:"Ventes",cls:"bad",title:"Retrouver le volume de commandes",action:"Priorité : comprendre pourquoi les commandes décrochent. Lire trafic par canal puis campagnes Ads ; si le trafic est stable, passer au tunnel PDP -> panier -> checkout."};
  if(byLabel("profit"))return{label:"Profit",cls:"bad",title:"Protéger la contribution avant de scaler",action:"Le CA ne suffit pas. Réduire les poches Ads sans signal et pousser les leviers à contribution directe : CRM, panier moyen, relance chaude."};
  if(byLabel("cac"))return{label:"Cash",cls:"bad",title:"Stopper la dérive d'acquisition",action:"Couper ou réduire les campagnes/requêtes qui dépensent sans vente. Objectif du jour : ramener le CPA sous la moyenne 7J."};
  if(has("pdp → atc"))return{label:"CRO",cls:"bad",title:"Réparer la page produit",action:"Travailler le premier écran mobile : promesse, preuve, offre, CTA. C'est le meilleur levier si le trafic arrive mais n'ajoute pas au panier."};
  if(has("atc → checkout"))return{label:"Panier",cls:"warn",title:"Réduire la friction panier",action:"Vérifier frais, livraison, codes promo et réassurance. Le problème est après l'ajout panier."};
  if(has("checkout → commandes"))return{label:"Checkout",cls:"warn",title:"Sécuriser le checkout",action:"Tester paiement mobile, frais surprises, moyens de paiement et messages de confiance."};
  if(byLabel("search"))return{label:"Ads",cls:"warn",title:"Nettoyer Search",action:"Analyser les search terms : exclure l'informationnel, isoler les requêtes qui vendent, garder le budget sur l'intention forte."};
  if(critical)return{label:"Risque",cls:"bad",title:critical.title,action:critical.action||critical.body};
  const good=list.find(a=>String(a.label||"").toLowerCase().includes("bonne nouvelle"));
  if(good)return{label:"Scaler",cls:"good",title:"Exploiter le levier gagnant",action:good.action||"Identifier ce qui a marché et le prolonger aujourd'hui sans scaler à l'aveugle."};
  if(p["7d"].roas>=3&&p["7d"].ord)return{label:"Offense",cls:"good",title:"Pousser le meilleur levier rentable",action:"Ads rentable et commandes présentes : augmenter doucement uniquement les campagnes gagnantes, tout en surveillant CPA et marge."};
  return{label:"Focus",cls:"warn",title:"Chercher le plus gros blocage",action:"Lire les risques ci-dessous dans l'ordre. Traiter d'abord le premier point rouge/orange, pas dix sujets en parallèle."};
}

function adsBusinessDecision(p,m){

  ${qr.map(r=>{const pos=num(gv(r,"Position")),ctr=ctrv(r);return`<div class="row"><span class="rn">${esc(gv(r,"Query")||"—")}<br><span class="rs">${esc(qrec(r))}</span></span><div class="rm"><span class="rs">Pos. <span style="color:${pos<=3?"var(--g)":pos<=10?"var(--o)":"var(--r)"}">${pos?Math.round(pos*10)/10:"—"}</span></span><span class="rs">Clics <span style="color:var(--accent)">${fm(num(gv(r,"Clicks")))}</span></span><span class="rs">CTR <span style="color:${ctr>=3?"var(--g)":"var(--sec)"}">${pt(ctr)}</span></span></div></div>`;}).join("")||`<div class="empty">Pas de données requêtes.</div>`}

}
function srec(r){
  const page=String(gv(r,"Page")||""),pos=num(gv(r,"Position")),ctr=ctrv(r),im=num(gv(r,"Impressions"));
  if(isSeoAssetUrl(page)||(!pos&&!im)||im<50)return null;
  const expected=expectedCtrForPosition(pos);
  if(pos<=3&&ctr>=expected)return{label:"À PROTÉGER",ac:"bg",action:"Position forte et CTR sain. Garder l'angle, rafraîchir preuve/FAQ légèrement et renforcer le maillage interne vers cette page."};
  if(pos<=3&&ctr<expected)return{label:"OPTIMISER CTR",ac:"bw",action:`Déjà haut dans Google mais CTR sous potentiel (${Math.round(ctr*10)/10}%). Tester title/meta plus orientés bénéfice, preuve et intention exacte.`};
  if(pos>=4&&pos<=10&&im>=100)return{label:"QUICK WIN",ac:"bg",action:seoPageAction(page,pos,ctr,im)};
  if(pos>10&&im>=200)return{label:"À RÉCUPÉRER",ac:"bw",action:`Volume présent mais page hors zone de clic. Renforcer contenu utile, preuve et liens internes avant de créer un nouveau contenu.`};
  return{label:"SURVEILLER",ac:"bi",action:`Base faible ou position secondaire. Attendre plus de volume ou traiter après les quick wins prioritaires.`};
}
function seoPageAction(page,pos,ctr,im){
  const p=String(page||"").toLowerCase(),lowCtr=ctr<expectedCtrForPosition(pos);
  if(lowCtr)return"CTR faible pour la position : tester meta title/meta description avec bénéfice clair, preuve produit et intention exacte.";
  if(/danger|avis|dermatologue|effet|yeux|risque|securite/.test(p))return"Intention preuve/objection : ajouter bloc rassurance, sources, FAQ sécurité et liens vers produit/essai.";
  if(/meilleur|comparatif|que-choisir|avis/.test(p))return"Intention choix/comparatif : renforcer critères de décision, preuves produit et maillage vers la PDP.";
  if(/combien|comment|couleur|signification|frequence|routine/.test(p))return"Intention question : ajouter une réponse courte, FAQ dédiée et lien interne vers la page produit pertinente.";
  return"Page proche top 3 : renforcer une section utile, 3-5 liens internes et preuve produit sans réécrire toute la page.";
}
function qrec(r){
  const q=String(gv(r,"Query")||""),text=q.toLowerCase(),pos=num(gv(r,"Position")),ctr=ctrv(r),im=num(gv(r,"Impressions")),cl=num(gv(r,"Clicks"));
  const lowCtr=ctr<expectedCtrForPosition(pos);
  if(/holiae|holia[eē]/.test(text))return"Marque : à protéger. Vérifier que le title reste clair et que la page de destination capte bien l'intention brand.";
  if(pos<=3&&ctr>=expectedCtrForPosition(pos))return"À protéger : déjà haut avec CTR sain. Ne pas modifier brutalement, renforcer seulement le maillage.";
  if(pos<=3&&lowCtr&&im>100)return"À optimiser CTR : position forte mais clics sous potentiel. Tester title/meta plus précis.";
  if(pos>=4&&pos<=10&&im>100&&lowCtr)return"Quick win CTR : optimiser meta title/description avant d'ajouter du contenu.";
  if(pos>=4&&pos<=10&&im>100&&/danger|avis|dermatologue|efficace|combien|comment|yeux|effet|couleur|signification|que choisir|ufc/.test(text))return"Quick win preuve/FAQ : traiter en FAQ ou bloc rassurance, puis lier vers la page produit.";
  if(pos>=4&&pos<=10&&im>100)return"Quick win business : renforcer la page déjà pertinente avec H2 ciblé seulement si le thème est central, sinon lien interne.";
  if(pos>10&&im>200)return"À récupérer : demande existante mais autorité insuffisante. Renforcer la page cible et son maillage.";
  if(cl>0)return"À suivre : apporte déjà du trafic, mais volume trop faible pour une action prioritaire.";
  return"Pas d'action immédiate tant que le volume reste faible.";
}

  return`<div class="funnel">${st.map(s=>`<div class="fstep"><div class="fl">${s[0]}</div><div class="fv">${fm(s[1])}</div><div class="fs">${s[3]}</div><div class="fb" style="height:${s[2]}px"></div></div>`).join("")}</div>`;

  const issues=[];
  if(p.p2a!=null&&p.p2a<2.2)issues.push({step:"PDP → ATC",value:p.p2a,text:`Blocage global : PDP → ATC faible (${pt(p.p2a)}). La priorité MTD est d'améliorer l'envie d'ajout panier : preuve, offre, prix, réassurance, premier écran mobile.`});
  if(p.a2c!=null&&p.a2c<35)issues.push({step:"ATC → Checkout",value:p.a2c,text:`Blocage global : ATC → Checkout faible (${pt(p.a2c)}). Vérifier panier, frais, livraison, codes promo et réassurance.`});
  if(p.c2o!=null&&p.c2o<30)issues.push({step:"Checkout → Achat",value:p.c2o,text:`Blocage global : Checkout → Achat faible (${pt(p.c2o)}). Vérifier paiement mobile, frais surprise et confiance checkout.`});
  if(!issues.length)return"";
  const isShort=m&&m.p&&p===m.p["7d"];
  const is28=m&&m.p&&p===m.p["28d"];
  const is90=m&&m.p&&p===m.p["90d"];
  const isYtd=m&&m.p&&p===m.p.ytd;
  const hasPdp=issues.some(i=>i.step==="PDP → ATC");
  const hasCart=issues.some(i=>i.step==="ATC → Checkout");
  if(isShort&&hasPdp&&hasCart)return`<div class="empty">Double blocage court terme : PDP → ATC faible (${pt(p.p2a)}) et ATC → Checkout faible (${pt(p.a2c)}). Priorité CRO/panier avant acquisition : preuve et offre sur PDP, puis frais, livraison, code promo et réassurance panier.</div>`;
  if(is28&&hasPdp){
    const recent=m&&m.adam?`<br>Nuance : global 28J = PDP → ATC faible. Ads récent : lire ADAM pour le blocage Search et ne pas scaler si ADAM reste en FIX/HOLD.`:"";
    return`<div class="empty">Blocage structurel 28J : PDP → ATC faible (${pt(p.p2a)}). Le trafic arrive, mais l'envie d'ajout panier reste trop basse.${recent}</div>`;
  }
  if(is90&&hasPdp){
    return`<div class="empty">Structurel 3M : PDP → ATC faible (${pt(p.p2a)}). Court terme 7J : ATC → Checkout s'est dégradé (${pt(m.p["7d"].a2c)}). Hiérarchie : améliorer l'envie d'ajout panier, puis contrôler la friction panier récente.</div>`;
  }
  if(isYtd&&hasPdp){
    return`<div class="empty">Structurel YTD : PDP → ATC reste le principal levier (${pt(p.p2a)}). Les personnes qui ajoutent au panier avancent plutôt bien vers checkout ; ne pas traiter le checkout comme problème principal annuel.</div>`;
  }
  const main=issues[0].text;
  const recent=!isShort&&m&&m.p&&m.p["7d"]&&m.p["7d"].a2c!=null&&m.p["7d"].a2c<50&&issues[0].step!=="ATC → Checkout"
    ?`<br>Nuance : global MTD = ${esc(issues[0].step)} faible, mais le récent 7J montre aussi ATC → Checkout à surveiller (${pt(m.p["7d"].a2c)}).`
    :"";
  return`<div class="empty">${main}${recent}</div>`;
}

function shortTermTransformationNote(p,ref){
  if(!p||!ref||!p.sess||!ref.sess)return"";
  const sess=(p.sess-ref.sess)/Math.abs(ref.sess)*100;
  const ord=ref.ord?(p.ord-ref.ord)/Math.abs(ref.ord)*100:null;
  const rev=ref.rev?(p.rev-ref.rev)/Math.abs(ref.rev)*100:null;
  if(sess>0&&((ord!=null&&ord<0)||(rev!=null&&rev<0))){
    return`<div class="empty">Le problème court terme n'est pas le volume de trafic, c'est la transformation : sessions ${signedPct(sess)}, commandes ${ord==null?"—":signedPct(ord)}, CA ${rev==null?"—":signedPct(rev)}. Ne pas acheter plus de trafic tant que le tunnel ne transforme pas.</div>`;
  }
  return"";
}

function periodGrowthNote(p,ref){

function campRead(c){
  if(c.cost>=100&&!c.pur&&c.status!=="ACTIF")return`${c.status} · Historique non rentable : ne pas relancer tel quel.`;
  if(c.cost>=100&&!c.pur&&c.status==="ACTIF")return"Actif · À archiver ou couper si encore actif : spend significatif sans vente Ads.";
  if(c.pur>=2&&c.roas>=3)return"À protéger : récupérer les termes/angles gagnants, sans scale global si ADAM reste en FIX/HOLD.";
  if(c.pur>0&&c.roas<3)return"Surveiller contribution : vente attribuée, mais rentabilité encore fragile.";
  if(c.cost>=25&&!c.pur)return`${c.status} · À contrôler : spend significatif sans vente Ads attribuée.`;
  return`${c.status} · Lecture faible volume : ne pas conclure lourdement.`;
}

function objBar(m,key,p){

  if(avgPos<=4&&avgCtr>=3)return{text:"SEO sain",detail:`Position moyenne ${Math.round(avgPos*10)/10} · CTR ${Math.round(avgCtr*10)/10}%. Ne pas casser ce qui marche : mise à jour légère + maillage vers les pages business.`,label:"Bon",cls:"good"};

function crmGlobalRec(m){
  const rows=m.raw.klav||[];
  if(!rows.length)return{text:"Données CRM insuffisantes",detail:"Connecter Klaviyo pour voir les recommandations.",label:"Données",cls:"warn"};
  const totalRev=sm(rows,"Revenue");
  const totalRec=sm(rows,"Recipients");
  const wOpen=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*crmRate(r,"Open rate"),0);
  const avgOpen=totalRec?wOpen/totalRec:0;
  const wClick=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*crmRate(r,"Click rate"),0);
  const avgClick=totalRec?wClick/totalRec:0;
  const wUnsub=rows.reduce((a,r)=>a+num(gv(r,"Recipients"))*crmRate(r,"Unsubscribe rate"),0);
  const avgUnsub=totalRec?wUnsub/totalRec:0;
  const flows=rows.filter(r=>String(gv(r,"Type")||"").toLowerCase()==="flow");
  const flowRev=sm(flows,"Revenue");
  const flowShare=totalRev?flowRev/totalRev*100:0;
  const suspicious=totalRev>0&&totalRec>=500&&avgOpen>0&&avgOpen<1;
  if(suspicious)return{text:"Vérifier les taux CRM",detail:`Revenue ${mo(totalRev)} mais open moyen ${pt1(avgOpen)}. Format open/click rate suspect dans la Sheet : vérifier si Klaviyo stocke 0.2, 20 ou 20%.`,label:"Data",cls:"warn"};
  if(avgUnsub>0.5)return{text:"Pression trop forte",detail:`Unsub moyen ${pt1(avgUnsub)}. Action : réduire la fréquence des campagnes larges et segmenter par intention/achat récent.`,label:"Urgence",cls:"bad"};
  if(flowShare<30&&totalRev>0)return{text:"Automatiser plus de CA",detail:`Flows = ${Math.round(flowShare)}% du CA CRM. Action : renforcer abandon checkout/panier, post-achat et win-back avant d'augmenter les campagnes.`,label:"Flows",cls:"warn"};
  if(totalRev>0&&avgOpen>=18&&avgClick<1)return{text:"Travailler le clic/offre",detail:`Open ${pt1(avgOpen)} correct, click ${pt1(avgClick)} faible. Action : renforcer promesse, CTA, offre et transition email → PDP.`,label:"Clic",cls:"warn"};
  if(avgOpen>=18&&totalRev>0)return{text:"Renforcer les flows vendeurs",detail:`Open ${pt1(avgOpen)} · Revenue ${mo(totalRev)}. Protéger les flows qui vendent et répliquer leurs angles, pas refaire toute l'accroche.`,label:"Bon",cls:"good"};
  if(avgOpen<10&&totalRec>=500)return{text:"Travailler objet + preview",detail:`Open ${pt1(avgOpen)} sur volume suffisant. Action : tester objet + preview text, puis segmenter les non-acheteurs chauds séparément.`,label:"Engagement",cls:"warn"};
  return{text:"Lire par revenu",detail:`CRM attribué ${mo(totalRev)}. Prioriser flows/campagnes avec revenu, puis gros volumes sans revenu ; ignorer les micro-envois.`,label:"Pilotage",cls:"warn"};
}
function crmItemRec(r,tp){
  const rv=num(gv(r,"Revenue")),rec=num(gv(r,"Recipients")),op=crmRate(r,"Open rate"),cl=crmRate(r,"Click rate"),un=crmRate(r,"Unsubscribe rate");
  const rpr=rec?rv/rec:null,ctor=op?cl/op*100:null;
  if(un>0.5)return"Action : pression trop forte. Réduire fréquence ou resserrer l'audience avant le prochain envoi.";
  if(rec>=100&&rv>0&&rpr<0.2)return`Action : revenue par destinataire faible (${mo(rpr)}). L'audience ouvre peut-être, mais l'offre ou le segment ne vend pas assez.`;
  if(op>=20&&ctor!=null&&ctor<6)return`Action : CTOR faible (${pt1(ctor)}). L'objet fait ouvrir, mais le contenu/CTA ne transforme pas l'attention en clic.`;
  if(tp==="flow"&&/avantage[_\s-]*decouverte/i.test(String(gv(r,"Name")||""))&&rv>0)return"Action : Flow moteur. Protéger la séquence, tester une seule amélioration à la fois et décliner son angle dans campagnes/retargeting.";
  if(rv>0&&cl>=2)return tp==="flow"?"Action : flow vendeur. Ne pas modifier brutalement, tester seulement 1 amélioration objet/CTA/offre.":"Action : angle à recycler. Le réutiliser sur un segment proche ou en relance chaude.";
  if(rec>=100&&op<18)return"Action : problème d'ouverture. Tester objet + preview text, pas le contenu interne en premier.";
  if(op>=20&&cl<1.5)return"Action : l'objet fait ouvrir mais le contenu ne pousse pas assez au clic. Revoir offre, CTA et premier écran.";
  if(tp==="flow"&&rec>=50&&!rv)return"Action : vérifier trigger, délai et offre. Le flow tourne mais ne vend pas encore.";
  if(tp==="campaign"&&rec>=500&&!rv)return"Action : à auditer. Gros volume sans CA : revoir segment, objet, offre et timing avant de dupliquer.";
  if(tp==="campaign"&&rec>=100&&!rv)return"Action : campagne sans CA. Ne pas dupliquer telle quelle, changer angle ou segment.";
  return"Action : garder en observation, pas assez de signal pour décider proprement.";
}
function crmRate(row,field){return normalizeRate(gv(row,field));}
function normalizeRate(value){
  if(value==null||value==="")return 0;
  const raw=String(value).trim().replace(",",".");
  const hasPct=raw.indexOf("%")!==-1;
  const parsed=Number(raw.replace("%",""));
  if(!Number.isFinite(parsed))return 0;
  if(hasPct)return parsed;
  return Math.abs(parsed)<=1?parsed*100:parsed;
}
function crmSort(a,b){
  const ar=num(gv(a,"Revenue")),br=num(gv(b,"Revenue")),arec=num(gv(a,"Recipients")),brec=num(gv(b,"Recipients"));
  const as=(ar>0?100000+ar:0)+(arec>=500&&!ar?50000:0)+arec/100;
  const bs=(br>0?100000+br:0)+(brec>=500&&!br?50000:0)+brec/100;
  return bs-as;
}
function crmItemTag(r,tp){
  const rv=num(gv(r,"Revenue")),rec=num(gv(r,"Recipients")),name=String(gv(r,"Name")||"");
  if(tp==="flow"&&/avantage[_\s-]*decouverte/i.test(name)&&rv>0)return"Flow moteur";
  if(tp==="flow")return"Flow";
  if(rv>0)return"Angle à recycler";
  if(rec>=500)return"À auditer";
  return"Campagne";
}
function crmRevenueActions(p){
  return (p.klavItems||[]).slice(0,6).map(x=>{
    const rpo=x.orders?x.revenue/x.orders:null;

    if(x.type.toLowerCase()==="flow"&&/avantage[_\s-]*decouverte/i.test(x.name)&&x.revenue>0)action="Flow moteur : protéger la séquence, tester une seule amélioration à la fois et décliner son angle.";

    else if(x.type.toLowerCase()==="flow"&&x.revenue>0)action="Signal positif mais fragile : attendre plus de commandes avant de modifier fort.";
    else if(x.type.toLowerCase()==="campaign"&&x.revenue>0&&x.orders>=2)action="Angle campagne vendeur : recycler l'angle sur un segment proche ou en relance.";

    else action="Pas d'action forte.";
    if(rpo&&rpo<300)action+=" AOV CRM faible : verifier remise, bundle ou segment.";
    return{...x,action};
  });
}

function fl(q){const s=q.toLowerCase().trim(),it=document.querySelectorAll("#li .lex-i");let c=0;it.forEach(e=>{const show=!s||e.dataset.s.includes(s);e.style.display=show?"":"none";if(show)c++;});document.getElementById("le").style.display=c===0?"":"none";}
function bt(rows,s,e){return rows.filter(r=>isIso(gv(r,"Date"))&&gv(r,"Date")>=s&&gv(r,"Date")<=e);}
function topR(rows,f,l){return[...rows].sort((a,b)=>num(gv(b,f))-num(gv(a,f))).slice(0,l);}
function topSearchTerms(rows,l){
  const out={};
  rows.forEach(r=>{
    const term=String(gv(r,"Search term")||gv(r,"Keyword")||gv(r,"Query")||"").trim();
    if(!term)return;
    const key=term.toLowerCase();
    if(!out[key])out[key]={term,cost:0,clicks:0,impr:0,pur:0,value:0};
    out[key].cost+=num(gv(r,"Cost")||gv(r,"Cout"));
    out[key].clicks+=num(gv(r,"Clicks")||gv(r,"Clics"));
    out[key].impr+=num(gv(r,"Impressions"));
    out[key].pur+=num(gv(r,"Purchases")||gv(r,"Conversions"));
    out[key].value+=num(gv(r,"Purchase value")||gv(r,"Revenue_Ads"));
  });
  return Object.values(out).map(x=>({...x,ctr:x.impr?x.clicks/x.impr*100:null,roas:dv(x.value,x.cost),cpa:dv(x.cost,x.pur)})).sort((a,b)=>b.clicks-a.clicks||b.cost-a.cost).slice(0,l);
}
function termRec(r,periodAov){
  const intent=termIntent(r.term);
  const target=targetCpaFromAov(periodAov);
  if(target&&r.pur>=2&&r.cpa>target*1.25)return`${intent} · CPA ${mo(r.cpa)} > cible ${mo(target)} : reduire enchere ou isoler avant de remettre du budget.`;
  if(r.pur===1&&r.roas>=3)return`${intent} · 1 vente rentable : garder, mais attendre confirmation avant d'isoler ou scaler.`;
  if(r.pur>0&&r.roas>=3)return`${intent} · Rentable : isoler en exact ou groupe dédié, et monter doucement si le volume suit.`;
  if(r.pur>0)return"Convertit mais marge faible : garder, puis améliorer annonce/page avant de scaler.";
  if(intent==="Informationnel"&&r.clicks>=8&&!r.pur)return"Informationnel : ne pas couper automatiquement. Envoyer vers guide/LP éducative ou exclure si l'objectif est vente directe.";
  if(r.cost>=20&&r.clicks>=10)return`${intent} · Dépense sans vente : exclure si intention faible, sinon tester une annonce plus directe.`;
  if(r.clicks>=8&&r.ctr!=null&&r.ctr<2)return"Beaucoup d'affichages mais peu de clics : titre/annonce à rendre plus précis.";
  if(r.clicks>=5)return"Signal utile : attendre encore ou surveiller le coût avant exclusion.";
  return"Peu de données : aucune décision forte.";
}
function termIntent(t){const s=String(t||"").toLowerCase();if(/holia|holiae|holiaē/.test(s))return"Marque";if(/vs|versus|compar|meilleur|avis|review|alternative/.test(s))return"Comparatif";if(/acheter|prix|promo|code|boutique|masque led|anti age|rides/.test(s))return"Transactionnel";return"Informationnel";}
function grossMarginParts(p){
  if(!p||!p.rev||!p.ord)return null;
  const vat=p.rev-(p.rev/(1+VAT_RATE));
  const cogs=p.ord*PRODUCT_COGS;
  const shipping=p.ord*SHIPPING_COST;
  const payment=p.rev*PAYMENT_RATE+p.ord*PAYMENT_FIXED;
  return{vat,cogs,shipping,payment};
}
function contribution(p){
  const parts=grossMarginParts(p);
  if(!parts)return null;
  const ads=p.cost||0,value=p.rev-parts.vat-parts.cogs-parts.shipping-parts.payment-ads;
  return{value,rate:p.rev?value/p.rev*100:null,ads,...parts};
}
function targetCpaFromAov(aov){
  if(!aov)return null;
  const vat=aov-(aov/(1+VAT_RATE));
  const payment=aov*PAYMENT_RATE+PAYMENT_FIXED;
  const targetProfit=aov*0.30;
  return Math.max(0,aov-vat-PRODUCT_COGS-SHIPPING_COST-payment-targetProfit);
}
function budgetPace(m){if(!m||!m.ob.bAds)return null;const dE=Math.max(1,pd(m.ld).getDate()),dM=new Date(+m.ld.slice(0,4),+m.ld.slice(5,7),0).getDate(),expected=m.ob.bAds*dE/dM;return expected?m.p.mtd.cost/expected*100:null;}
function gv(row,n){return row?.[n]??"";}
function sm(rows,f){return rows.reduce((a,r)=>a+num(gv(r,f)),0);}
function num(x){if(x==null||x==="")return 0;const v=Number(String(x).replace(/\s/g,"").replace(",","."));return Number.isFinite(v)?v:0;}
function ctrv(r){const v=num(gv(r,"CTR"));return v&&v<=1?v*100:v;}
function dv(a,b){return b?a/b:null;}
function isMissing(x){return x==null||x===""||!Number.isFinite(Number(x));}
function cpaAds(p){return p&&p.adPur?mo(p.cpa):"non lisible";}
function mo(x){return isMissing(x)?"—":EU.format(Number(x));}
function mo0(x){return EU.format(Number(x||0));}
function fm(x){return isMissing(x)?"—":NF.format(Math.round(Number(x)));}
function fm1(x){return x==null||!Number.isFinite(x)?"—":NF.format(Math.round(x*10)/10);}
function rt(x){return isMissing(x)?"—":NF.format(Math.round(Number(x)*100)/100);}
function pt(x){return x==null||!Number.isFinite(x)?"—":`${NF.format(Math.round(x*10)/10)}%`;}
function pt1(x){return x==null||!Number.isFinite(x)?"—":`${new Intl.NumberFormat("fr-FR",{minimumFractionDigits:1,maximumFractionDigits:1}).format(Math.round(x*10)/10)}%`;}
function pt2(x){return x==null||!Number.isFinite(x)?"—":`${NF.format(Math.round(x*100)/100)}%`;}
function fpt(x){return x==null||!Number.isFinite(x)?"—":NF.format(Math.round(x*100)/100);}
function signedPct(x){return `${x>=0?"+":"-"}${pt(Math.abs(x))}`;}
function dlPct(cur,old){if(cur==null||old==null||isMissing(cur)||isMissing(old))return`<span class="N">—</span>`;const ptDelta=Number(cur)-Number(old),rel=Number(old)?ptDelta/Math.abs(Number(old))*100:null;if(Math.abs(Math.round(ptDelta*100)/100)===0)return`<span class="N">Stable${rel==null?"":` · ${signedPct(rel)}`}</span>`;const g=ptDelta>=0;return`<span class="${g?"G":"R"}">${g?"▲":"▼"} ${fpt(ptDelta)} pt${rel==null?"":` · ${signedPct(rel)}`}</span>`;}
function dl(cur,old,pu=true,u=""){if(cur==null||old==null||isMissing(cur)||isMissing(old))return`<span class="N">—</span>`;if(Number(old)===0){if(Number(cur)===0)return`<span class="N">= 0</span>`;return`<span class="${pu?"G":"R"}">▲ depuis 0</span>`;}const raw=u==="pt"?Number(cur)-Number(old):(Number(cur)-Number(old))/Math.abs(Number(old))*100;const g=pu?raw>=0:raw<=0;return`<span class="${g?"G":"R"}">${raw>=0?"▲":"▼"} ${u==="pt"?`${Math.round(raw*10)/10}pt`:pt(Math.abs(raw))}</span>`;}
function nt(t){const s=String(t||"").toUpperCase();if(s.includes("PERFORMANCE_MAX")||s.includes("PMAX"))return"PMAX";if(s.includes("SEARCH"))return"SEARCH";if(s.includes("BRAND"))return"BRAND";return s||"OTHER";}
function isDateHeader(k){return["Date","date"].includes(String(k||"").trim());}
function normDate(v){
  if(v==null||v==="")return"";
  if(typeof v==="number"||/^\d{5}(\.\d+)?$/.test(String(v))){
    const n=Number(v),d=new Date(Date.UTC(1899,11,30)+n*864e5);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=s.match(/^(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return s;
}
function pd(s){const[y,m,d]=String(s).slice(0,10).split("-").map(Number);return new Date(y,m-1,d);}
function add(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function iso(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function monthStart(d){return`${d.slice(0,7)}-01`;}
function isIso(s){return/^\d{4}-\d{2}-\d{2}$/.test(String(s||""));}
function leap(y){return y%4===0&&(y%100!==0||y%400===0);}
function prevMonthSamePeriod(d){const x=pd(d),endDay=Math.min(x.getDate(),new Date(x.getFullYear(),x.getMonth(),0).getDate()),s=new Date(x.getFullYear(),x.getMonth()-1,1),e=new Date(x.getFullYear(),x.getMonth()-1,endDay);return{s:iso(s),e:iso(e)};}
function fd(d){return isIso(d)?new Date(`${d}T12:00:00`).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function monthLabel(d){return isIso(d)?pd(d).toLocaleDateString("fr-FR",{month:"long"}):"Mois";}
function todayIso(){return iso(new Date());}
function isNewMonthWaiting(m){return !!(m&&m.ld&&todayIso().slice(0,7)>String(m.ld).slice(0,7));}
function mtdTabLabel(m){return isNewMonthWaiting(m)?`${monthLabel(m.ld)} clôturé`:monthLabel(m.ld);}
function surl(url){try{const u=new URL(String(url));return u.pathname.replace(/^\/|\/$/g,"")||u.hostname;}catch{return String(url||"");}}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
